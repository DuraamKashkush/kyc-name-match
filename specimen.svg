<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" width="1000" height="660">
  <!--
    A schematic specimen travel document, drawn as a diagram so the OCR pipeline
    has something to read.

    The issuing state is UTO / UTOPIA — the fictional country ICAO uses in its
    own Doc 9303 specimens. That is deliberate: it is the standards-correct way
    to draw an example travel document, it cannot be mistaken for any real
    country's, and this file is therefore a diagram rather than anything that
    could function as a specimen of a genuine document. It carries no crest, no
    security features and no photograph, and says SPECIMEN across the middle.

    The machine-readable zone below is arithmetically valid under ICAO Doc 9303,
    so its check digits genuinely verify when read. The holder is invented.
  -->
  <rect width="1000" height="660" fill="#ffffff"/>
  <rect x="14" y="14" width="972" height="632" fill="none" stroke="#111111" stroke-width="3"/>

  <g font-family="Helvetica, Arial, sans-serif" fill="#111111">
    <text x="44" y="66" font-size="26" letter-spacing="3">PASSPORT / PASSEPORT</text>
    <text x="44" y="96" font-size="17" fill="#444444">UTOPIA · UTO</text>
    <line x1="44" y1="112" x2="956" y2="112" stroke="#111111" stroke-width="1.5"/>

    <!-- Photograph placeholder: an empty box, never an image of a person. -->
    <rect x="44" y="136" width="200" height="250" fill="none" stroke="#111111" stroke-width="2"/>
    <line x1="44" y1="136" x2="244" y2="386" stroke="#cccccc" stroke-width="1.5"/>
    <line x1="244" y1="136" x2="44" y2="386" stroke="#cccccc" stroke-width="1.5"/>
    <text x="144" y="266" font-size="15" fill="#888888" text-anchor="middle">PHOTOGRAPH</text>

    <g font-size="13" fill="#666666" letter-spacing="1">
      <text x="290" y="152">TYPE / TYPE</text>
      <text x="420" y="152">CODE / CODE</text>
      <text x="600" y="152">PASSPORT NO. / N° DE PASSEPORT</text>
      <text x="290" y="216">SURNAME / NOM</text>
      <text x="290" y="280">GIVEN NAMES / PRENOMS</text>
      <text x="290" y="344">NATIONALITY / NATIONALITE</text>
      <text x="600" y="344">DATE OF BIRTH / DATE DE NAISSANCE</text>
      <text x="290" y="408">SEX / SEXE</text>
      <text x="420" y="408">DATE OF EXPIRY / DATE D'EXPIRATION</text>
    </g>

    <g font-size="23" font-family="Courier New, Courier, monospace">
      <text x="290" y="180">P</text>
      <text x="420" y="180">UTO</text>
      <text x="600" y="180">L898902C3</text>
      <text x="290" y="244">ERIKSSON</text>
      <text x="290" y="308">ANNA MARIA</text>
      <text x="290" y="372">UTOPIAN</text>
      <text x="600" y="372">12 AUG 1974</text>
      <text x="290" y="436">F</text>
      <text x="420" y="436">15 APR 2031</text>
    </g>

    <text x="500" y="330" font-size="86" fill="#111111" opacity="0.10"
          text-anchor="middle" letter-spacing="12">SPECIMEN</text>
    <text x="500" y="474" font-size="14" fill="#999999" text-anchor="middle" letter-spacing="2">
      SPECIMEN — SYNTHETIC DIAGRAM, NOT A REAL DOCUMENT, NOT A REAL PERSON
    </text>
  </g>

  <!-- Machine-readable zone. Valid ICAO Doc 9303 check digits. -->
  <line x1="14" y1="496" x2="986" y2="496" stroke="#111111" stroke-width="1.5"/>
  <rect x="14" y="496" width="972" height="150" fill="#ffffff"/>
  <!-- Two rendering details that were arrived at by measuring, not taste.
       No letter-spacing: the font is already monospaced, and adding tracking
       widens the gaps enough that the recogniser starts splitting glyphs and
       losing characters, which breaks the line length everything downstream
       depends on. And the filler '<' is the character a general-purpose model
       reads worst — Courier's thin angle bracket comes back as K or L — so the
       font here is chosen for the clarity of that one glyph.
       This file is the editable source; the app reads specimen.png, rendered
       from it, so a visitor's installed fonts cannot change the result. -->
  <g font-family="Lucida Console, DejaVu Sans Mono, Consolas, monospace"
     font-size="36" fill="#000000" xml:space="preserve">
    <text x="34" y="562">P&lt;UTOERIKSSON&lt;&lt;ANNA&lt;MARIA&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;</text>
    <text x="34" y="618">L898902C36UTO7408122F3104150ZE184226B&lt;&lt;&lt;&lt;&lt;16</text>
  </g>
</svg>
