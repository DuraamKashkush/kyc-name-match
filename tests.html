<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<title>Test suite — name matching for KYC</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <span class="nav-brand">Test suite</span>
    <div class="nav-links"><a href="index.html">Back to the tool</a></div>
  </div>
</nav>

<header class="hero">
  <span class="pill">Half of these hold the engine back</span>
  <h1>Every assertion,<br>run in this page.</h1>
  <p>The same file runs under <code>node tests.js</code>. Much of the suite exists to stop the
     engine matching two different people.</p>
</header>

<main>
  <div id="summary" class="test-summary">Running…</div>
  <table class="tests"><tbody id="results"></tbody></table>
</main>

<script src="lexicon.js"></script>
<script src="mrz.js"></script>
<script src="rules.js"></script>
<script src="engine.js"></script>
<script src="cases.js"></script>
<script src="ocr.js"></script>
<script src="tests.js"></script>
<script>
(function () {
  var out = TEST_SUITE.run();

  var summary = document.getElementById('summary');
  summary.className = 'test-summary ' + (out.failed ? 'fail' : 'pass');
  summary.textContent = out.failed
    ? out.failed + ' FAILED — ' + out.passed + ' passed of ' + out.total
    : 'All ' + out.passed + ' assertions passed — engine ' + KYC.VERSION;

  var body = document.getElementById('results');
  out.results.forEach(function (r) {
    var tr = document.createElement('tr');
    if (r.type === 'group') {
      tr.className = 'test-group';
      var td = document.createElement('td');
      td.colSpan = 3;
      td.textContent = r.name;
      tr.appendChild(td);
    } else {
      var res = document.createElement('td');
      res.className = 'res ' + (r.ok ? 'ok' : 'no');
      res.textContent = r.ok ? 'pass' : 'FAIL';
      tr.appendChild(res);

      var name = document.createElement('td');
      name.textContent = r.name;
      tr.appendChild(name);

      var detail = document.createElement('td');
      detail.className = 'detail';
      detail.textContent = r.detail || '';
      tr.appendChild(detail);
    }
    body.appendChild(tr);
  });
})();
</script>
</body>
</html>
